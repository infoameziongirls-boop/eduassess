services:
  - type: web
    name: eduassess
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eduassess-db
          property: connectionString
      - key: PERSISTENT_DIR
        value: /var/data

databases:
  - name: eduassess-db
    plan: free
